<svg width="420" height="100" viewBox="0 0 420 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pfill { from { width: 86px; } to { width: 308px; } }
    .pfill { animation: pfill 28s linear infinite; }
  </style>

  <!-- Card -->
  <rect width="420" height="100" rx="14" fill="#1a1a2e"/>
  <rect width="420" height="100" rx="14" fill="none" stroke="#2d2d5e" stroke-width="1"/>

  <!-- Album art: clipped so rotation stays inside the box -->
  <clipPath id="ac"><rect x="16" y="18" width="64" height="64" rx="10"/></clipPath>
  <g clip-path="url(#ac)">
    <rect x="16" y="18" width="64" height="64" rx="10" fill="url(#albumGrad)"/>
    <text x="48" y="57" font-size="26" text-anchor="middle"
          fill="rgba(255,255,255,0.3)" font-family="Arial">&#9835;</text>
    <animateTransform attributeName="transform" type="rotate"
      from="0 48 50" to="360 48 50" dur="10s" repeatCount="indefinite"/>
  </g>

  <!-- NOW PLAYING label -->
  <text x="96" y="32" font-size="11" font-weight="700" fill="#1db954"
        font-family="Arial, sans-serif" letter-spacing="1">NOW PLAYING</text>

  <!-- Equaliser bars — anchored at y=33, grow upward -->
  <rect x="186" width="3" rx="2" fill="#1db954">
    <animate attributeName="height" values="2;14;2" dur="0.8s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <animate attributeName="y" values="31;19;31" dur="0.8s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </rect>
  <rect x="192" width="3" rx="2" fill="#1db954">
    <animate attributeName="height" values="2;14;2" dur="0.8s" begin="0.1s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <animate attributeName="y" values="31;19;31" dur="0.8s" begin="0.1s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </rect>
  <rect x="198" width="3" rx="2" fill="#1db954">
    <animate attributeName="height" values="2;14;2" dur="0.8s" begin="0.2s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <animate attributeName="y" values="31;19;31" dur="0.8s" begin="0.2s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </rect>
  <rect x="204" width="3" rx="2" fill="#1db954">
    <animate attributeName="height" values="2;14;2" dur="0.8s" begin="0.15s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
    <animate attributeName="y" values="31;19;31" dur="0.8s" begin="0.15s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;0.5;1" keySplines="0.42 0 0.58 1;0.42 0 0.58 1"/>
  </rect>

  <!-- Song title -->
  <text x="96" y="52" font-size="15" font-weight="700" fill="#ffffff"
        font-family="Arial, sans-serif">Blinding Lights</text>

  <!-- Artist -->
  <text x="96" y="67" font-size="12" fill="#8b949e"
        font-family="Arial, sans-serif">The Weeknd</text>

  <!-- Progress bar -->
  <rect x="96" y="78" width="308" height="3" rx="99" fill="#2a2a4a"/>
  <rect class="pfill" x="96" y="78" width="86" height="3" rx="99" fill="#1db954"/>

  <defs>
    <linearGradient id="albumGrad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#c724d4"/>
      <stop offset="100%" stop-color="#7928ca"/>
    </linearGradient>
  </defs>
</svg>

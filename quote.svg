<svg width="480" height="110" viewBox="0 0 480 110" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Card -->
  <rect width="480" height="110" rx="14" fill="#1a1a2e"/>
  <rect width="480" height="110" rx="14" fill="none" stroke="#2d2d5e" stroke-width="1"/>

  <!-- Opening quote mark -->
  <text x="20" y="52" font-size="52" font-weight="700" font-family="Arial, sans-serif"
        fill="url(#qGrad)" opacity="0.85">"</text>

  <!-- Quote text -->
  <text x="52" y="40" font-size="12.5" font-family="Arial, sans-serif"
        fill="#e6edf3" font-style="italic">
    <tspan x="52" dy="0">If you need more than 3 levels of indentation,</tspan>
    <tspan x="52" dy="18">you're screwed anyway, and should fix your program.</tspan>
  </text>

  <!-- Divider -->
  <rect x="52" y="72" width="376" height="1" fill="#2d2d5e"/>

  <!-- Author -->
  <text x="428" y="91" font-size="11.5" font-family="Arial, sans-serif"
        fill="#8b949e" text-anchor="end">— Linus Torvalds</text>

  <defs>
    <linearGradient id="qGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c724d4"/>
      <stop offset="100%" stop-color="#7928ca"/>
    </linearGradient>
  </defs>
</svg>

<svg width="200" height="35" viewBox="0 0 480 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="qGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c724d4"/>
      <stop offset="100%" stop-color="#7928ca"/>
    </linearGradient>
    <linearGradient id="accentBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c724d4"/>
      <stop offset="100%" stop-color="#7928ca"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <path d="M0,0 H466 Q480,0 480,14 V66 Q480,80 466,80 H0 Z" fill="#1a1a2e"/>
  <path d="M0,0 H466 Q480,0 480,14 V66 Q480,80 466,80 H0 Z" fill="none" stroke="#2d2d5e" stroke-width="1"/>

  <rect x="0" y="0" width="5" height="80" fill="url(#accentBar)"/>

  <text x="20" y="48" font-size="56" font-weight="700" font-family="Arial, sans-serif"
        fill="url(#qGrad)" opacity="0.25" filter="url(#glow)">"</text>
  <text x="20" y="48" font-size="56" font-weight="700" font-family="Arial, sans-serif"
        fill="url(#qGrad)" opacity="0.7">"</text>

  <text font-family="Arial, sans-serif" font-style="italic" fill="#e6edf3">
    <tspan x="64" y="34" font-size="13" letter-spacing="0.2">Talk is cheap. Show me the code.</tspan>
  </text>

  <rect x="64" y="48" width="390" height="1" rx="1" fill="url(#qGrad)" opacity="0.3"/>

  <text x="454" y="65" font-size="11.5" font-family="Arial, sans-serif"
        font-weight="700" fill="url(#qGrad)" text-anchor="end" letter-spacing="0.3">
    — Linus Torvalds
  </text>
</svg>
